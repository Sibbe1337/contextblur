<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <filter id="blur128" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#grad128)"/>
  
  <!-- Blur effect circles in background -->
  <circle cx="40" cy="40" r="15" fill="white" opacity="0.1" filter="url(#blur128)"/>
  <circle cx="88" cy="88" r="20" fill="white" opacity="0.1" filter="url(#blur128)"/>
  
  <!-- Main crosshair -->
  <circle cx="64" cy="64" r="32" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
  <circle cx="64" cy="64" r="10" fill="white" opacity="0.85"/>
  
  <!-- Crosshair lines -->
  <line x1="64" y1="16" x2="64" y2="32" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="96" x2="64" y2="112" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="64" x2="32" y2="64" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="96" y1="64" x2="112" y2="64" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>

